<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2c3e50;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --nav-bg: #1a252f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        /* Navigation Bar */
        .navbar {
            background-color: var(--nav-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav-brand {
            font-size: 20px;
            font-weight: bold;
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            background-color: transparent;
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: white;
            color: var(--nav-bg);
        }

        .lang-select {
            padding: 6px;
            border-radius: 4px;
        }

        /* Main Container */
        .container {
            max-width: 950px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .hidden { display: none !important; }

        /* Timer View Styles */
        .timer-container {
            background: white;
            padding: 50px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 50px;
        }

        .time-display {
            font-size: 80px;
            font-family: monospace;
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .timer-controls button {
            font-size: 18px;
            padding: 12px 30px;
            margin: 0 10px;
            min-width: 120px;
        }

        .btn-start { background-color: #27ae60; }
        .btn-start:hover { background-color: #2ecc71; }
        .btn-pause { background-color: #f39c12; }
        .btn-pause:hover { background-color: #f1c40f; }
        .btn-reset { background-color: #e74c3c; }
        .btn-reset:hover { background-color: #c0392b; }

        /* Reviews View Styles */
        .reviews-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 30px;
        }

        .review-btn {
            display: inline-block;
            background-color: #8e44ad;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 30px;
            transition: background 0.3s;
        }

        .review-btn:hover {
            background-color: #9b59b6;
        }

        .sheet-embed {
            width: 100%;
            height: 500px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .sheet-embed iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Existing Dashboard Styles */
        .dashboard-top {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .summary-card, .insights-card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            min-width: 300px;
        }
        
        .insights-card {
            background: #e8f8f5;
            border: 1px solid #a3e4d7;
            display: none; 
        }

        .filters-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        select, input {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        .total-display { font-size: 24px; font-weight: bold; color: #2980b9; }
        .progress-text { font-size: 22px; margin: 10px 0; font-weight: bold; }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            height: 400px; 
            display: flex;
            justify-content: center;
        }

        .form-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] { flex: 2; min-width: 200px; }
        input[type="number"] { flex: 1; min-width: 90px; }
        input[type="date"] { flex: 1; min-width: 130px; }
        input:read-only { background-color: #e9ecef; cursor: not-allowed; }

        button {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover { background-color: #45a049; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: var(--secondary-color); color: white; }
        tr:hover { background-color: #f9f9f9; }
        .delete-btn { background-color: #e74c3c; padding: 6px 12px; font-size: 14px; }
        .delete-btn:hover { background-color: #c0392b; }
        .empty-state { text-align: center; padding: 20px; color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand" id="t-brand">📚 Study Tracker</div>
        <div class="nav-controls">
            <button class="nav-btn active" id="btn-dashboard" onclick="switchView('dashboard')">Dashboard</button>
            <button class="nav-btn" id="btn-timer" onclick="switchView('timer')">Timer</button>
            <button class="nav-btn" id="btn-reviews" onclick="switchView('reviews')">Reviews</button>
            <select class="lang-select" id="langSelector" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="zh">中文 (Chinese)</option>
            </select>
        </div>
    </nav>

    <div class="container">
        
        <div id="view-dashboard">
            <h2 id="t-dashTitle">Overview</h2>

            <div class="dashboard-top">
                <div class="summary-card">
                    <h3 id="t-filtersTitle">Filters & Totals</h3>
                    <div class="filters-container">
                        <select id="timeFilter" onchange="applyFiltersAndRender()">
                            <option value="all" id="t-allTime">All Time</option>
                            <option value="7days" id="t-last7Days">Last 7 Days</option>
                        </select>
                        <select id="subjectFilter" onchange="applyFiltersAndRender()">
                            <option value="all" id="t-allSubj">All Subjects</option>
                        </select>
                    </div>
                    <div class="total-display">
                        <span id="t-totalHours">Total Hours:</span> <span id="totalHoursNum">0.0</span>
                    </div>
                </div>

                <div class="insights-card" id="insightsCard">
                    <h3 id="insightSubjectName">Subject Name</h3>
                    <div class="progress-text">
                        <span id="insightLogged">0</span> / <span id="insightGoal">0</span>
                    </div>
                    <p style="margin:0; color:#555; font-size: 14px;" id="t-goalSubtext">(7-Day Goal based on Credits)</p>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="studyChart"></canvas>
            </div>

            <div class="form-container">
                <input type="text" id="subjectInput" list="subjectList" placeholder="Subject Name" required oninput="checkKnownSubject()">
                <datalist id="subjectList">
                    <option value="Mobile Programming"></option>
                    <option value="Enterprise Resource Planning (ERP)"></option>
                    <option value="Augmented Reality"></option>
                </datalist>

                <input type="number" id="creditInput" placeholder="Credits" min="1" required>
                <input type="number" id="timeInput" placeholder="Hours" min="0.1" step="0.1" required>
                <input type="date" id="dateInput" required>
                
                <button onclick="addRecord()" id="t-addBtn" style="flex: 1; min-width: 120px;">Add Record</button>
            </div>

            <table id="studyTable">
                <thead>
                    <tr>
                        <th id="t-thDate">Date</th>
                        <th id="t-thSubj">Subject</th>
                        <th id="t-thHours">Logged Time (h)</th>
                        <th id="t-thAct">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="view-timer" class="hidden">
            <div class="timer-container">
                <h2 id="t-timerTitle">Study Stopwatch</h2>
                <div class="time-display" id="stopwatchDisplay">00:00:00</div>
                <div class="timer-controls">
                    <button class="btn-start" id="t-btnStart" onclick="startTimer()">Start</button>
                    <button class="btn-pause" id="t-btnPause" onclick="pauseTimer()">Pause</button>
                    <button class="btn-reset" id="t-btnReset" onclick="resetTimer()">Reset</button>
                </div>
            </div>
        </div>

        <div id="view-reviews" class="hidden">
            <div class="reviews-container">
                <h2 id="t-reviewsTitle">User Reviews</h2>
                
                <a href="https://forms.gle/hj3U59b1A25yEcNe6" target="_blank" class="review-btn" id="t-leaveReviewBtn">📝 Leave a Review</a>

                <h3 id="t-seeReviewsTitle" style="margin-top: 20px; color: var(--secondary-color);">What others are saying:</h3>
                
                <div class="sheet-embed">
                    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQOGnOC9hhNR2GsrQySAsf-qF8-w7d2To59iItXmMgzoaxC46EnVM6Q0O_iTwuKXPaX297wMtGOY96n/pubhtml?gid=608999379&amp;single=true&amp;widget=true&amp;headers=false"" frameborder="0"></iframe>
                </div>
            </div>
        </div>

    </div>

    <script>
        /* ================= TRANSLATION DICTIONARY ================= */
        const translations = {
            en: {
                brand: "📚 Study Tracker",
                btnDash: "Dashboard",
                btnTimer: "Timer",
                btnReviews: "Reviews",
                dashTitle: "Overview",
                filtersTitle: "Filters & Totals",
                allTime: "All Time",
                last7Days: "Last 7 Days",
                allSubj: "All Subjects",
                totalHours: "Total Hours:",
                goalSubtext: "(7-Day Goal based on Credits)",
                placeholderSubj: "Subject Name",
                placeholderCred: "Credits",
                placeholderHr: "Hours",
                addBtn: "Add Record",
                thDate: "Date",
                thSubj: "Subject",
                thHours: "Logged Time (h)",
                thAct: "Action",
                emptyTable: "No records found.",
                chartLabel: "Study Hours",
                timerTitle: "Study Stopwatch",
                btnStart: "Start",
                btnPause: "Pause",
                btnReset: "Reset",
                reviewsTitle: "User Reviews",
                leaveReviewBtn: "📝 Leave a Review",
                seeReviewsTitle: "What others are saying:",
                alertFill: "Please fill in all fields."
            },
            zh: {
                brand: "📚 学习追踪器",
                btnDash: "仪表板",
                btnTimer: "计时器",
                btnReviews: "评论",
                dashTitle: "总览",
                filtersTitle: "筛选与总计",
                allTime: "所有时间",
                last7Days: "最近 7 天",
                allSubj: "所有科目",
                totalHours: "总时长:",
                goalSubtext: "(基于学分的7天目标)",
                placeholderSubj: "科目名称",
                placeholderCred: "学分",
                placeholderHr: "小时",
                addBtn: "添加记录",
                thDate: "日期",
                thSubj: "科目",
                thHours: "记录时间 (小时)",
                thAct: "操作",
                emptyTable: "未找到记录。",
                chartLabel: "学习时长",
                timerTitle: "学习秒表",
                btnStart: "开始",
                btnPause: "暂停",
                btnReset: "重置",
                reviewsTitle: "用户评价",
                leaveReviewBtn: "📝 留下评价",
                seeReviewsTitle: "其他人的看法:",
                alertFill: "请填写所有字段。"
            }
        };

        let currentLang = 'en';

        function changeLanguage() {
            currentLang = document.getElementById('langSelector').value;
            const t = translations[currentLang];

            // Navbar
            document.getElementById('t-brand').innerText = t.brand;
            document.getElementById('btn-dashboard').innerText = t.btnDash;
            document.getElementById('btn-timer').innerText = t.btnTimer;
            document.getElementById('btn-reviews').innerText = t.btnReviews;
            
            // Dashboard
            document.getElementById('t-dashTitle').innerText = t.dashTitle;
            document.getElementById('t-filtersTitle').innerText = t.filtersTitle;
            document.getElementById('t-allTime').innerText = t.allTime;
            document.getElementById('t-last7Days').innerText = t.last7Days;
            document.getElementById('t-allSubj').innerText = t.allSubj;
            document.getElementById('t-totalHours').innerText = t.totalHours;
            document.getElementById('t-goalSubtext').innerText = t.goalSubtext;
            document.getElementById('subjectInput').placeholder = t.placeholderSubj;
            document.getElementById('creditInput').placeholder = t.placeholderCred;
            document.getElementById('timeInput').placeholder = t.placeholderHr;
            document.getElementById('t-addBtn').innerText = t.addBtn;
            document.getElementById('t-thDate').innerText = t.thDate;
            document.getElementById('t-thSubj').innerText = t.thSubj;
            document.getElementById('t-thHours').innerText = t.thHours;
            document.getElementById('t-thAct').innerText = t.thAct;

            // Timer
            document.getElementById('t-timerTitle').innerText = t.timerTitle;
            document.getElementById('t-btnStart').innerText = t.btnStart;
            document.getElementById('t-btnPause').innerText = t.btnPause;
            document.getElementById('t-btnReset').innerText = t.btnReset;

            // Reviews
            document.getElementById('t-reviewsTitle').innerText = t.reviewsTitle;
            document.getElementById('t-leaveReviewBtn').innerText = t.leaveReviewBtn;
            document.getElementById('t-seeReviewsTitle').innerText = t.seeReviewsTitle;

            updateSubjectLists();
            applyFiltersAndRender();
        }

        /* ================= VIEW SWITCHER ================= */
        function switchView(viewName) {
            const views = ['dashboard', 'timer', 'reviews'];
            
            views.forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`btn-${v}`).classList.remove('active');
            });
            
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            document.getElementById(`btn-${viewName}`).classList.add('active');
        }

        /* ================= TIMER LOGIC ================= */
        let timerInterval;
        let seconds = 0;
        let isRunning = false;

        function updateTimerDisplay() {
            const hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
            const secs = String(seconds % 60).padStart(2, '0');
            document.getElementById('stopwatchDisplay').innerText = `${hrs}:${mins}:${secs}`;
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                timerInterval = setInterval(() => {
                    seconds++;
                    updateTimerDisplay();
                }, 1000);
            }
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
        }

        function resetTimer() {
            pauseTimer();
            seconds = 0;
            updateTimerDisplay();
        }

        /* ================= TRACKER LOGIC ================= */
        document.getElementById('dateInput').valueAsDate = new Date();
        let studyData = JSON.parse(localStorage.getItem('studyRecords')) || [];
        let subjectCredits = JSON.parse(localStorage.getItem('subjectCredits')) || {}; 
        let myChart = null; 

        function getRecommendedWeeklyHours(creditScore) {
            const score = parseInt(creditScore);
            if (score === 2) return 4;
            if (score === 3) return 8;
            return score * 2; 
        }

        function checkKnownSubject() {
            const subject = document.getElementById('subjectInput').value.trim();
            const creditInput = document.getElementById('creditInput');

            if (subjectCredits[subject]) {
                creditInput.value = subjectCredits[subject];
                creditInput.readOnly = true;
            } else {
                if (creditInput.readOnly) creditInput.value = ''; 
                creditInput.readOnly = false;
            }
        }

        function updateSubjectLists() {
            const datalist = document.getElementById('subjectList');
            const filterDropdown = document.getElementById('subjectFilter');
            const currentFilterValue = filterDropdown.value; 
            const t = translations[currentLang];
            
            const uniqueSubjects = [...new Set(studyData.map(record => record.subject))].sort();
            const defaultOptions = ["Mobile Programming", "Enterprise Resource Planning (ERP)", "Augmented Reality"];
            const allOptions = [...new Set([...defaultOptions, ...uniqueSubjects])];

            datalist.innerHTML = ''; 
            allOptions.forEach(subject => {
                const option = document.createElement('option');
                option.value = subject;
                datalist.appendChild(option);
            });

            filterDropdown.innerHTML = `<option value="all">${t.allSubj}</option>`;
            uniqueSubjects.forEach(subject => {
                const option = document.createElement('option');
                option.value = subject;
                option.textContent = subject;
                filterDropdown.appendChild(option);
            });

            if (uniqueSubjects.includes(currentFilterValue) || currentFilterValue === 'all') {
                filterDropdown.value = currentFilterValue;
            } else {
                filterDropdown.value = 'all';
            }
        }

        function updateInsights(subject) {
            const insightsCard = document.getElementById('insightsCard');
            if (subject === 'all') {
                insightsCard.style.display = 'none';
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            let recentHours = 0;
            studyData.forEach(record => {
                if (record.subject === subject) {
                    const recordDate = new Date(record.date);
                    const diffDays = Math.abs(today - recordDate) / (1000 * 60 * 60 * 24);
                    if (diffDays <= 7) {
                        recentHours += record.time;
                    }
                }
            });

            const credits = subjectCredits[subject] || 0;
            const goalHours = getRecommendedWeeklyHours(credits);

            document.getElementById('insightSubjectName').innerText = subject;
            document.getElementById('insightLogged').innerText = recentHours.toFixed(1);
            document.getElementById('insightGoal').innerText = goalHours;
            
            const progressText = document.querySelector('.progress-text');
            if (recentHours >= goalHours) {
                progressText.style.color = '#27ae60'; 
            } else {
                progressText.style.color = '#e74c3c'; 
            }

            insightsCard.style.display = 'block';
        }

        function updateChart(filteredData) {
            const ctx = document.getElementById('studyChart').getContext('2d');
            const t = translations[currentLang];
            
            const chartDataObj = {};
            filteredData.forEach(record => {
                if (!chartDataObj[record.subject]) chartDataObj[record.subject] = 0;
                chartDataObj[record.subject] += record.time;
            });

            const labels = Object.keys(chartDataObj);
            const dataPoints = Object.values(chartDataObj);

            if (myChart) myChart.destroy();
            if (labels.length === 0) return;

            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: t.chartLabel,
                        data: dataPoints,
                        backgroundColor: 'rgba(52, 152, 219, 0.4)',
                        borderColor: '#2980b9',
                        pointBackgroundColor: '#2c3e50',
                        pointBorderColor: '#fff',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: { angleLines: { display: true }, suggestedMin: 0, ticks: { stepSize: 2 } }
                    },
                    elements: { line: { tension: 0 } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function applyFiltersAndRender() {
            const timeFilter = document.getElementById('timeFilter').value;
            const subjectFilter = document.getElementById('subjectFilter').value;
            const t = translations[currentLang];
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let filteredData = studyData.filter(record => {
                const matchSubject = (subjectFilter === 'all') || (record.subject === subjectFilter);
                let matchTime = true;
                if (timeFilter === '7days') {
                    const recordDate = new Date(record.date);
                    const diffTime = Math.abs(today - recordDate);
                    matchTime = (diffTime / (1000 * 60 * 60 * 24)) <= 7;
                }
                return matchSubject && matchTime;
            });

            const total = filteredData.reduce((sum, record) => sum + record.time, 0);
            document.getElementById('totalHoursNum').innerText = total.toFixed(1);

            updateInsights(subjectFilter);
            updateChart(filteredData);

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="empty-state">${t.emptyTable}</td></tr>`;
                return;
            }

            filteredData.sort((a, b) => new Date(b.date) - new Date(a.date));

            filteredData.forEach((record) => {
                const originalIndex = studyData.indexOf(record);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${record.date}</td>
                    <td>${record.subject}</td>
                    <td>${record.time.toFixed(1)}</td>
                    <td><button class="delete-btn" onclick="deleteRecord(${originalIndex})">X</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function addRecord() {
            const subject = document.getElementById('subjectInput').value.trim();
            const creditStr = document.getElementById('creditInput').value.trim();
            const time = document.getElementById('timeInput').value.trim();
            const date = document.getElementById('dateInput').value;
            const t = translations[currentLang];

            if (subject === '' || creditStr === '' || time === '' || date === '') {
                alert(t.alertFill);
                return;
            }

            subjectCredits[subject] = parseInt(creditStr);
            localStorage.setItem('subjectCredits', JSON.stringify(subjectCredits));

            studyData.push({ subject: subject, time: parseFloat(time), date: date });
            localStorage.setItem('studyRecords', JSON.stringify(studyData));

            document.getElementById('subjectInput').value = '';
            document.getElementById('creditInput').value = '';
            document.getElementById('creditInput').readOnly = false;
            document.getElementById('timeInput').value = '';

            updateSubjectLists();
            applyFiltersAndRender();
        }

        function deleteRecord(index) {
            studyData.splice(index, 1);
            localStorage.setItem('studyRecords', JSON.stringify(studyData));
            updateSubjectLists();
            applyFiltersAndRender();
        }

        updateSubjectLists();
        applyFiltersAndRender();
    </script>
</body>
</html>
